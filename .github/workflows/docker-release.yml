name: Build and publish Docker image

on:
  push:
    branches: [ master ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stupidhack-2026:latest
            ghcr.io/${{ github.repository_owner }}/stupidhack-2026:${{ github.sha }}

      - name: Set GHCR package visibility to public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER=${{ github.repository_owner }}
          PACKAGE=stupidhack-2026
          # Try org endpoint
          curl -s -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d '{"visibility":"public"}' \
            "https://api.github.com/orgs/${OWNER}/packages/container/${PACKAGE}/visibility" || true
          # Try user endpoint
          curl -s -X PUT \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d '{"visibility":"public"}' \
            "https://api.github.com/users/${OWNER}/packages/container/${PACKAGE}/visibility" || true

      - name: Create GitHub Release for tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Docker images pushed:
            - ghcr.io/${{ github.repository_owner }}/stupidhack-2026:${{ github.sha }}
            - ghcr.io/${{ github.repository_owner }}/stupidhack-2026:latest
